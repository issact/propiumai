        function drawRadarSVG(scores) {
            const width = 240;
            const height = 240;
            const cx = 120;
            const cy = 120;
            const maxR = 80;

            const getCoords = (val, axis) => {
                const r = (val / 25) * maxR;
                switch(axis) {
                    case 0: return { x: cx, y: cy - r };
                    case 1: return { x: cx + r, y: cy };
                    case 2: return { x: cx, y: cy + r };
                    case 3: return { x: cx - r, y: cy };
                }
            };

            const p0 = getCoords(scores.builder, 0);
            const p1 = getCoords(scores.investment, 1);
            const p2 = getCoords(scores.location, 2);
            const p3 = getCoords(scores.product, 3);

            return `
                <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
                    <polygon points="120,40 200,120 120,200 40,120" fill="none" stroke="#E2E8F0" stroke-width="1.5" />
                    <polygon points="120,60 180,120 120,180 60,120" fill="none" stroke="#E2E8F0" stroke-width="1.5" />
                    <polygon points="120,80 160,120 120,160 80,120" fill="none" stroke="#E2E8F0" stroke-width="1.5" />
                    <polygon points="120,100 140,120 120,140 100,120" fill="none" stroke="#E2E8F0" stroke-width="1.5" />
                    <line x1="120" y1="40" x2="120" y2="200" stroke="#E2E8F0" stroke-width="1.5" />

                    <polygon points="${p0.x},${p0.y} ${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}" fill="rgba(245, 158, 11, 0.15)" stroke="#F59E0B" stroke-width="2.5" />
                    <circle cx="${p0.x}" cy="${p0.y}" r="3.5" fill="#F59E0B" stroke="#fff" stroke-width="1.5" />
                    <circle cx="${p1.x}" cy="${p1.y}" r="3.5" fill="#F59E0B" stroke="#fff" stroke-width="1.5" />
                    <circle cx="${p2.x}" cy="${p2.y}" r="3.5" fill="#F59E0B" stroke="#fff" stroke-width="1.5" />
                    <circle cx="${p3.x}" cy="${p3.y}" r="3.5" fill="#F59E0B" stroke="#fff" stroke-width="1.5" />
                </svg>
            `;
        }

        function drawTrendSVG(history) {
            const years = history.years;
            const projectPrices = history.projectPrices;
            const corridorPrices = history.corridorPrices;

            const width = 680;
            const height = 220;
            const paddingLeft = 55;
            const paddingRight = 30;
            const paddingTop = 25;
            const paddingBottom = 35;

            const chartWidth = width - paddingLeft - paddingRight;
            const chartHeight = height - paddingTop - paddingBottom;

            const maxVal = 45000;
            const minVal = 0;

            const getX = (idx) => paddingLeft + (idx / (years.length - 1)) * chartWidth;
            const getY = (val) => paddingTop + chartHeight - ((val - minVal) / (maxVal - minVal)) * chartHeight;

            let elements = '';

            const yTicks = [0, 15000, 30000, 45000];
            yTicks.forEach(tick => {
                const y = getY(tick);
                elements += `<line x1="${paddingLeft}" y1="${y}" x2="${width - paddingRight}" y2="${y}" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3 3" />`;
                elements += `<text x="${paddingLeft - 10}" y="${y + 3.5}" fill="#64748B" font-size="10" font-weight="600" text-anchor="end">₹${tick.toLocaleString()}</text>`;
            });

            years.forEach((year, idx) => {
                const x = getX(idx);
                elements += `<text x="${x}" y="${height - 12}" fill="#64748B" font-size="10" font-weight="600" text-anchor="middle">${year}</text>`;
            });

            let corridorPoints = corridorPrices.map((val, idx) => `${getX(idx)},${getY(val)}`).join(' ');
            elements += `<polyline points="${corridorPoints}" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-dasharray="5 5" />`;

            let activeProjectPoints = [];
            projectPrices.forEach((val, idx) => {
                if (val > 0) {
                    activeProjectPoints.push(`${getX(idx)},${getY(val)}`);
                }
            });
            if (activeProjectPoints.length > 0) {
                elements += `<polyline points="${activeProjectPoints.join(' ')}" fill="none" stroke="#F59E0B" stroke-width="3" />`;
            }

            corridorPrices.forEach((val, idx) => {
                elements += `<circle cx="${getX(idx)}" cy="${getY(val)}" r="4" fill="#0F172A" stroke="#ffffff" stroke-width="2" />`;
            });
            projectPrices.forEach((val, idx) => {
                if (val > 0) {
                    elements += `<circle cx="${getX(idx)}" cy="${getY(val)}" r="4.5" fill="#F59E0B" stroke="#ffffff" stroke-width="2" />`;
                }
            });

            return `
                <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
                    ${elements}
                </svg>
            `;
        }
